name: Validate Renovate

env:
  RENOVATE_VERSION: "43.272.7"

on:
  pull_request:
  merge_group:
    branches:
      - main

jobs:
  validate-org-inherited-config:
    name: Validate org-inherited-config.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm install -g renovate@${RENOVATE_VERSION}

      - name: Validate org-inherited-config.json
        run: renovate-config-validator --strict org-inherited-config.json

  validate-renovate-config:
    name: Validate renovate-config.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm install -g renovate@${RENOVATE_VERSION}

      - name: Validate renovate-config.json
        run: renovate-config-validator --strict renovate-config.json
