name: Validate Renovate

env:
  RENOVATE_VERSION: "43.232.1"

on:
  pull_request:
  merge_group:
    branches:
      - main

jobs:
  validate-org-inherited-config:
    name: Validate org-inherited-config.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm install -g renovate@${RENOVATE_VERSION}

      - name: Validate org-inherited-config.json
        run: renovate-config-validator --strict org-inherited-config.json

  validate-renovate-config:
    name: Validate renovate-config.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm install -g renovate@${RENOVATE_VERSION}

      - name: Validate renovate-config.json
        run: renovate-config-validator --strict renovate-config.json
