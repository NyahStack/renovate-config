name: Validate Renovate

env:
  RENOVATE_VERSION: "43.14.1"

on:
  pull_request:
    paths:
      - ".github/workflows/renovate.yml"
      - ".github/workflows/ci.yml"
      - ".github/renovate.json"
      - ".github/renovate.json5"
      - "renovate.json"
      - "renovate.json5"
      - "renovate-config.json"
      - "org-inherited-config.json"
  merge_group:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm install -g renovate@${RENOVATE_VERSION}

      - name: Validate org-inherited-config.json
        run: renovate-config-validator --strict org-inherited-config.json

      - name: Validate renovate-config.json
        run: renovate-config-validator --strict renovate-config.json
