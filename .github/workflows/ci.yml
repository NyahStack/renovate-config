name: Validate Renovate

env:
  RENOVATE_VERSION: "43.71.0"

on:
  pull_request:
  merge_group:
    branches:
      - main

jobs:
  validate-org-inherited-config:
    name: Validate org-inherited-config.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm install -g renovate@${RENOVATE_VERSION}

      - name: Validate org-inherited-config.json
        run: renovate-config-validator --strict org-inherited-config.json

  validate-renovate-config:
    name: Validate renovate-config.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: latest

      - name: Install dependencies
        run: npm install -g renovate@${RENOVATE_VERSION}

      - name: Validate renovate-config.json
        run: renovate-config-validator --strict renovate-config.json
