name: Renovate Self-Hosted

env:
  RENOVATE_VERSION: "43.91.4"

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      log-level:
        description: "Set the Renovate log level (default: info)"
        required: false
        default: info
        type: choice
        options:
          - info
          - debug

jobs:
  renovate:
    name: Self-hosted Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Get Token
        id: get-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-checks: write
          permission-statuses: write
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-workflows: write
          permission-vulnerability-alerts: read
          permission-members: read
          permission-metadata: read

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          token: ${{ steps.get-token.outputs.token }}
          persist-credentials: false

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@68a3ea99af6ad249940b5a9fdf44fc6d7f14378b # v46.1.6
        env:
          RENOVATE_DRY_RUN: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && 'full' || '' }}
          LOG_LEVEL: ${{ github.event.inputs.log-level || 'info' }}
          RENOVATE_PLATFORM_COMMIT: 'enabled'
        with:
          token: ${{ steps.get-token.outputs.token }}
          renovate-version: ${{ env.RENOVATE_VERSION }}
          configurationFile: ./renovate-config.json
