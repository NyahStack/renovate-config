name: Renovate Self-Hosted

env:
  RENOVATE_VERSION: "43.14.1"

on:
  pull_request:
    branches:
      - main
  merge_group:
    branches:
      - main
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      log-level:
        description: "Set the Renovate log level (default: info)"
        required: false
        default: info
        type: choice
        options:
          - info
          - debug

jobs:
  renovate:
    name: Self-hosted Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Get Token
        id: get-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 1
          token: ${{ steps.get-token.outputs.token }}
          persist-credentials: false

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@44f24283a60f64273f1294932f16ba61193cccca # v46.1.0
        env:
          RENOVATE_DRY_RUN: ${{ (github.event_name == 'pull_request' || github.event_name == 'merge_group') && 'full' || '' }}
          LOG_LEVEL: ${{ github.event.inputs.log-level || 'info' }}
          RENOVATE_PLATFORM_COMMIT: 'true'
        with:
          token: ${{ steps.get-token.outputs.token }}
          renovate-version: ${{ env.RENOVATE_VERSION }}
          configurationFile: ./renovate-config.json
